worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # --------------------------------------------------------------------------
    # Logging
    # --------------------------------------------------------------------------
    log_format main '$remote_addr - $request_time - "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;

    # --------------------------------------------------------------------------
    # Performance
    # --------------------------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip off;  # Embeddings JSON no se comprimen bien y consumen CPU

    # --------------------------------------------------------------------------
    # Limitar tamaño de cuerpo de petición (alineado con MAX_IMAGE_MB=5)
    # --------------------------------------------------------------------------
    client_max_body_size 6M;
    client_body_timeout 30s;
    client_header_timeout 10s;
    send_timeout 30s;

    # --------------------------------------------------------------------------
    # Rate limiting — zona compartida en memoria
    # --------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=embed_zone:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=health_zone:1m  rate=60r/m;
    limit_req_status 429;

    # --------------------------------------------------------------------------
    # Upstream — Uvicorn interno
    # --------------------------------------------------------------------------
    upstream fastreid_backend {
        server fastreid-service:8000;
        keepalive 32;
    }

    # --------------------------------------------------------------------------
    # Servidor HTTP — desarrollo local (sin TLS)
    # Para producción: restaurar bloque HTTPS y agregar ssl_certificate
    # --------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;
        server_tokens off;

        # ------------------------------------------------------------------
        # Security headers (sin HSTS — solo aplica sobre HTTPS)
        # ------------------------------------------------------------------
        add_header X-Content-Type-Options "nosniff"       always;
        add_header X-Frame-Options        "DENY"          always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header Referrer-Policy        "no-referrer"   always;

        # ------------------------------------------------------------------
        # Health — rate limiting más permisivo
        # ------------------------------------------------------------------
        location = /health {
            limit_req zone=health_zone burst=20 nodelay;

            proxy_pass         http://fastreid_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 10s;
        }

        # ------------------------------------------------------------------
        # Embed endpoints — rate limiting estricto
        # ------------------------------------------------------------------
        location ~ ^/embed/(person|vehicle)$ {
            limit_req zone=embed_zone burst=10 nodelay;

            proxy_pass         http://fastreid_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;

            # Proxy buffering activo para uploads multipart
            proxy_request_buffering on;
            proxy_buffering         on;
        }

        # ------------------------------------------------------------------
        # Denegar cualquier otra ruta
        # ------------------------------------------------------------------
        location / {
            return 404;
        }
    }
}
